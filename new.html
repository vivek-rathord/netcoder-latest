<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Netcoder Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root{
  --primary:#ff5532;
  --secondary:#6366f1;
  --bg:#0b1220;
  --card:#111a2e;
  --text:#ffffff;
  --muted:#94a3b8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  background: radial-gradient(circle at top, #111827, var(--bg));
  color:var(--text);
}

header{
  text-align:center;
  padding:70px 20px 20px;
}

header h1{
  font-size:48px;
  font-weight:700;
}

header h1 span{ color:var(--primary); }
header p{ color:var(--muted); }

/* FILTERS */
.filters{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:12px;
  margin:20px 0 40px;
}

.filters button{
  padding:10px 20px;
  border-radius:30px;
  border:none;
  cursor:pointer;
  background:rgba(255,255,255,0.05);
  color:var(--text);
  transition:0.3s;
}

.filters button.active,
.filters button:hover{
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  color:#000;
}

/* GRID SYSTEM USING BOOTSTRAP + CUSTOM */
.gallery{
  padding:0 40px 70px;
}

.card-box{
  background:var(--card);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  transition:0.4s;
  cursor:pointer;
}

.card-box:hover{
  transform:translateY(-8px);
}

.card-box img{
  width:100%;
  height:260px;
  object-fit:cover;
  transition:0.4s;
}

.card-box:hover img{
  transform:scale(1.08);
  filter:brightness(0.7);
}

.info{
  padding:15px;
}

.info h4{ font-size:16px; }
.info small{ color:var(--muted); }

/* LIGHTBOX */
.lightbox{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.lightbox img{
  max-width:90%;
  max-height:80%;
  border-radius:12px;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:35px;
  cursor:pointer;
}
</style>
</head>
<body>

<header>
  <h1>Netcoder <span>Gallery</span></h1>
  <p>Explore our creative works, student projects & modern UI inspirations</p>
</header>

<!-- FILTERS -->
<div class="filters">
  <button class="active" onclick="filterGallery(event,'all')">All</button>
  <button onclick="filterGallery(event,'web')">Web Design</button>
  <button onclick="filterGallery(event,'app')">App UI</button>
  <button onclick="filterGallery(event,'project')">Projects</button>
</div>

<!-- GRID SYSTEM (BOOTSTRAP) -->
<div class="gallery container">
  <div class="row g-4">

    <div class="col-12 col-sm-6 col-lg-4 card-item web">
      <div class="card-box">
        <img src="https://source.unsplash.com/600x400/?website,modern" />
        <div class="info"><h4>Modern Web Design</h4><small>UI Concept</small></div>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-lg-4 card-item app">
      <div class="card-box">
        <img src="https://source.unsplash.com/600x400/?mobile,app" />
        <div class="info"><h4>Mobile App UI</h4><small>Clean Design</small></div>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-lg-4 card-item project">
      <div class="card-box">
        <img src="https://source.unsplash.com/600x400/?coding,developer" />
        <div class="info"><h4>Student Project</h4><small>Live Work</small></div>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-lg-4 card-item web">
      <div class="card-box">
        <img src="https://source.unsplash.com/600x400/?dashboard" />
        <div class="info"><h4>Dashboard UI</h4><small>Admin Panel</small></div>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-lg-4 card-item app">
      <div class="card-box">
        <img src="https://source.unsplash.com/600x400/?ui,ux" />
        <div class="info"><h4>UI/UX Design</h4><small>Creative Flow</small></div>
      </div>
    </div>

    <div class="col-12 col-sm-6 col-lg-4 card-item project">
      <div class="card-box">
        <img src="https://source.unsplash.com/600x400/?startup" />
        <div class="info"><h4>Startup Project</h4><small>Innovation</small></div>
      </div>
    </div>

  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <span class="close" onclick="closeLightbox()">&times;</span>
  <img id="lightboxImg" />
</div>

<script>
function filterGallery(e,category){
  let items=document.querySelectorAll('.card-item');
  let buttons=document.querySelectorAll('.filters button');

  buttons.forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');

  items.forEach(item=>{
    if(category==='all' || item.classList.contains(category)){
      item.style.display='block';
    } else {
      item.style.display='none';
    }
  });
}

document.querySelectorAll('.card-box img').forEach(img=>{
  img.addEventListener('click',()=>{
    document.getElementById('lightbox').style.display='flex';
    document.getElementById('lightboxImg').src=img.src;
  });
});

function closeLightbox(){
  document.getElementById('lightbox').style.display='none';
}
</script>

</body>
</html>
