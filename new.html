<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Hero Banner</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f5f7fb;
}

/* HERO */
.hero-section-custom{
    min-height:100vh;
    display:flex;
    align-items:center;
    background: linear-gradient(135deg,#ffffff,#f2f4f8);
    overflow:hidden;
    padding:60px 0;
}

/* LEFT */
.hero-content-box h5{
    color:#777;
}

.hero-content-box h1{
    font-size:50px;
    color:#ff5532;
    margin:10px 0;
}

.hero-content-box p{
    color:#555;
    margin-bottom:20px;
}

.feature-list-custom li{
    list-style:none;
    margin:8px 0;
}

.feature-list-custom li::before{
    content:"✔";
    color:#ff5532;
    margin-right:10px;
}

/* BUTTONS */
.btn-main{
    padding:12px 22px;
    border-radius:6px;
    border:none;
    cursor:pointer;
    margin-right:10px;
    transition:.3s;
}

.btn-orange{
    background:#ff5532;
    color:#fff;
}

.btn-orange:hover{
    background:#e34725;
}

.btn-border{
    border:1px solid #ff5532;
    background:transparent;
    color:#ff5532;
}

.btn-border:hover{
    background:#ff5532;
    color:#fff;
}

/* RIGHT */
.hero-image-box{
    position:relative;
    width:100%;
    max-width:450px;
    margin:auto;
}

/* IMAGE WRAPPER */
.image-holder{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:2;
}

/* GLOW */
.image-holder::before{
    content:"";
    position:absolute;
    width:300px;
    height:300px;
    background:rgba(255,85,50,0.15);
    border-radius:50%;
    z-index:-1;
}

/* IMAGE */
.main-hero-img{
    width:100%;
    max-width:100%;
    animation:floatMain 4s ease-in-out infinite;
}

/* FLOATING TEXT */
.floating-tag{
    position:absolute;
    padding:8px 16px;
    background:#fff;
    border-radius:30px;
    font-size:13px;
    font-weight:500;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    animation:float 5s infinite ease-in-out;
    white-space:nowrap;
}

/* POSITIONS */
.tag1{ top:10%; left:0; }
.tag2{ top:15%; right:0; animation-delay:1s;}
.tag3{ bottom:20%; left:-10px; animation-delay:2s;}
.tag4{ bottom:10%; right:0; animation-delay:3s;}
.tag5{ top:50%; left:-40px; animation-delay:2.5s;}

/* ANIMATION */
@keyframes float{
    0%,100%{ transform:translateY(0);}
    50%{ transform:translateY(-15px);}
}

@keyframes floatMain{
    0%,100%{ transform:translateY(0);}
    50%{ transform:translateY(-20px);}
}

/* RESPONSIVE */
@media(max-width:992px){
    .hero-content-box h1{
        font-size:36px;
    }
}

@media(max-width:768px){
    .hero-section-custom{
        text-align:center;
    }

    .hero-image-box{
        margin-top:40px;
    }

    .floating-tag{
        font-size:11px;
        padding:6px 12px;
    }
}

</style>
</head>

<body>

<section class="hero-section-custom">
    <div class="container">
        <div class="row align-items-center">

            <!-- LEFT -->
            <div class="col-lg-6">
                <div class="hero-content-box">
                    <h5>Digital Marketing</h5>
                    <h1>Mentorship Program</h1>
                    <p>Learn SEO, Ads, Social Media & grow your career with real projects.</p>

                    <ul class="feature-list-custom">
                        <li>12-Week Structured Program</li>
                        <li>1-on-1 Mentorship</li>
                        <li>Live Projects</li>
                        <li>Placement Support</li>
                    </ul>

                    <div class="mt-3">
                        <button class="btn-main btn-orange">Get Started</button>
                        <button class="btn-main btn-border">Talk to Advisor</button>
                    </div>
                </div>
            </div>

            <!-- RIGHT -->
            <div class="col-lg-6 text-center">
                <div class="hero-image-box">

                    <div class="image-holder">
                        <img src="./images/digital-marketing.png" class="main-hero-img" alt="">
                    </div>

                    <!-- FLOATING TAGS -->
                    <div class="floating-tag tag1 float">SEO</div>
                    <div class="floating-tag tag2 float">Google Ads</div>
                    <div class="floating-tag tag3 float">Growth</div>
                    <div class="floating-tag tag4 float">Analytics</div>
                    <div class="floating-tag tag5 float">Content</div>

                </div>
            </div>

        </div>
    </div>
</section>

<script>
// DO NOT CHANGE (as you said)
const words = ["SEO", "Ads", "Branding", "Leads", "Marketing"];
const floats = document.querySelectorAll(".float");

floats.forEach((el, i) => {
    setInterval(() => {
        el.innerText = words[Math.floor(Math.random()*words.length)];
    }, 2500 + (i * 400));
});
</script>

</body>
</html>
